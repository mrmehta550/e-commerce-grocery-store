{% block extra_css %}
<style>
    /* Global Card Styles */
    .orders-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 24px;
        padding: 20px;
        font-family: 'Inter', sans-serif;
    }

    .order-card {
        background: #ffffff;
        border-radius: 16px;
        border: 1px solid #edf2f7;
        padding: 20px;
        position: relative;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
    }

    .order-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        border-color: #3b82f6;
    }

    /* Top Section: ID & Status */
    .card-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 16px;
    }

    .id-wrapper {
        display: flex;
        flex-direction: column;
    }

    .id-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        font-weight: 700;
    }

    .order-id {
        font-size: 1.1rem;
        font-weight: 800;
        color: #1e293b;
    }

    /* Dynamic Status Badges */
    .status-badge {
        padding: 6px 12px;
        border-radius: 8px;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
    }

    /* Logic-based colors (Assumes standard status names) */
    .status-delivered { background: #dcfce7; color: #15803d; }
    .status-processing { background: #dbeafe; color: #1d4ed8; }
    .status-pending { background: #fef3c7; color: #92400e; }
    .status-shipped { background: #f3e8ff; color: #7e22ce; }

    /* Price Section */
    .price-section {
        margin: 15px 0;
        padding: 12px 0;
        border-top: 1px dashed #e2e8f0;
        border-bottom: 1px dashed #e2e8f0;
    }

    .total-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .total-price {
        font-size: 1.25rem;
        font-weight: 700;
        color: #0f172a;
    }

    /* The "Track Order" Button */
    .track-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #2563eb;
        color: white;
        text-decoration: none;
        padding: 12px;
        border-radius: 10px;
        font-weight: 600;
        transition: background 0.2s;
        margin-top: 15px;
        gap: 8px;
    }

    .track-btn:hover {
        background: #1d4ed8;
        color: white;
    }

    .track-btn svg {
        width: 18px;
        height: 18px;
    }

    /* Empty State */
    .no-orders {
        text-align: center;
        padding: 50px;
        color: #64748b;
    }
</style>
{% endblock %}

<div class="orders-grid">
    {% for order in orders %}
        <div class="order-card">
            <div class="card-header">
                <div class="id-wrapper">
                    <span class="id-label">Reference</span>
                    <span class="order-id">#{{ order.id }}</span>
                </div>
                <span class="status-badge 
                    {% if order.status == 'delivered' %}status-delivered
                    {% elif order.status == 'processing' %}status-processing
                    {% elif order.status == 'shipped' %}status-shipped
                    {% else %}status-pending{% endif %}">
                    {{ order.get_status_display }}
                </span>
            </div>

            <div class="price-section">
                <div class="total-row">
                    <span style="color: #64748b; font-size: 0.9rem;">Order Total</span>
                    <span class="total-price">₹{{ order.total_price }}</span>
                </div>
            </div>

            <div class="card-footer">
                <a href="{% url 'order_tracking' order.id %}" class="track-btn">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    Track Live Order
                </a>
            </div>
        </div>
    {% empty %}
        <div class="no-orders">
            <h3>No orders found</h3>
            <p>Looks like you haven't placed any orders yet.</p>
        </div>
    {% endfor %}
</div>
