{% extends "base.html" %}
{% load crispy_forms_tags %}
{% load static %}

{% block content %}
<style>
    /* --- Auth Page Core Styles --- */
    body { background-color: #f4f7f6; }
    
    .auth-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 15px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* The Premium Card */
    .auth-card {
        background: #ffffff;
        width: 100%;
        max-width: 480px;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        border-top: 5px solid #b0d12b; /* Lime green brand accent */
        overflow: hidden;
    }

    /* Header Section */
    .auth-header {
        padding: 40px 40px 20px;
        text-align: center;
    }
    
    .auth-header h2 {
        font-weight: 700;
        color: #111;
        margin-bottom: 8px;
        font-size: 28px;
        letter-spacing: -0.5px;
    }
    
    .auth-subtitle {
        color: #777;
        font-size: 15px;
        margin: 0;
    }

    /* Form Body & Crispy Overrides */
    .auth-body {
        padding: 0 40px 30px;
    }

    /* Styling the Crispy Labels */
    .auth-body .control-label {
        font-weight: 600;
        color: #444;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
    }

    /* Styling the Crispy Inputs */
    .auth-body .form-control {
        height: 50px;
        border-radius: 5px;
        border: 1px solid #ddd;
        box-shadow: none !important;
        transition: all 0.3s ease;
        font-size: 15px;
        background-color: #fafafa;
    }
    
    .auth-body .form-control:focus {
        border-color: #b0d12b;
        background-color: #fff;
    }

    /* Error and Help Texts generated by Crispy */
    .auth-body .invalid-feedback {
        font-size: 12px;
        font-weight: 600;
        color: #dc3545;
        margin-top: 5px;
    }
    
    .auth-body .help-block {
        font-size: 12px;
        color: #888;
        margin-top: 5px;
    }

    /* Submit Button */
    .btn-auth {
        background-color: #000;
        color: #fff;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 15px;
        border: none;
        border-radius: 5px;
        width: 100%;
        transition: all 0.3s ease;
        margin-top: 20px;
    }
    
    .btn-auth:hover {
        background-color: #b0d12b;
        color: #000;
    }

    /* Footer Section */
    .auth-footer {
        text-align: center;
        padding: 20px;
        background-color: #fafafa;
        border-top: 1px solid #eee;
        margin: 0;
        font-size: 14px;
        color: #666;
    }
    
    .auth-footer a {
        color: #b0d12b;
        font-weight: 700;
        text-decoration: none;
        transition: color 0.2s;
    }
    
    .auth-footer a:hover {
        color: #000;
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h2><i class="fas fa-user-plus mr-2" style="color: #b0d12b;"></i> Create Account</h2>
            <p class="auth-subtitle">Join us today and start shopping</p>
        </div>

        <div class="auth-body">
            <form method="POST" novalidate>
                {% csrf_token %}
                
                {{ form|crispy }}

                <button type="submit" class="btn btn-auth shadow-sm">
                    Register Now
                </button>
            </form>
        </div>

        <div class="auth-footer">
            <p class="mb-0">Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
        </div>
    </div>
</div>

<script src="{% static 'js/auth.js' %}"></script>

{% endblock %}
